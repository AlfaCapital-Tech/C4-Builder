name: npm — публикация пакета

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Установка Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Установка зависимостей
        run: npm ci --ignore-scripts

      - name: Публикация
        run: |
          CURRENT=$(npm view @alfacapital-tech/c4builder version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p 'require("./package.json").version')
          if [ "$CURRENT" = "$LOCAL" ]; then
            echo "Версия $LOCAL уже опубликована, пропускаем"
          else
            npm publish --provenance --access public
          fi
